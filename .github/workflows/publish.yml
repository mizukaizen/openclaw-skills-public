name: Publish Skills

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CLIs
        run: |
          npm install -g clawhub agent-skills-cli

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          for skill_dir in */; do
            if [ -f "${skill_dir}SKILL.md" ]; then
              skill_name=$(basename "$skill_dir")
              echo "Publishing ${skill_name} to ClawHub..."
              clawhub publish "./${skill_dir}" --token "$CLAWHUB_TOKEN" || echo "ClawHub publish failed for ${skill_name}"
            fi
          done

      - name: Submit to SkillsMP
        run: |
          skills submit-repo ${{ github.repository }} || echo "SkillsMP submission failed"

      # Skills.sh indexes automatically from public repos — no action needed
